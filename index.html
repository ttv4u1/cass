<!DOCTYPE html>
<html lang="en" data-theme="cyber" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 
        FiRCHARGE VERSION TRACKING 
        WEB: 1.3.9-Stable
        ANDROID: 1.3.9-v35
    -->
    
    <title>FiRCHARGE Pro | v1.3.9 Stable</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@700&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #030508; --text: #ffffff; }

        /* THEME ENGINE */
        [data-theme="cyber"] { --accent: #00d2ff; --glow: rgba(0, 210, 255, 0.4); }
        [data-theme="solar"] { --accent: #ff9d00; --glow: rgba(255, 157, 0, 0.4); }
        [data-theme="bio"] { --accent: #32ff7e; --glow: rgba(50, 255, 126, 0.4); }
        [data-theme="royal"] { --accent: #bd00ff; --glow: rgba(189, 0, 255, 0.4); }
        [data-theme="stealth"] { --accent: #ffffff; --glow: rgba(255, 255, 255, 0.2); }

        [data-mode="white"] { --bg: #f1f5f9; --text: #0f172a; --card: rgba(255,255,255,0.8); --border: rgba(0,0,0,0.05); }
        [data-mode="dark"] { --bg: #030508; --text: #ffffff; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }

        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; min-height: 100vh; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        .box-container {
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* 3D Pixar Style Icons */
        .pixar-3d {
            filter: drop-shadow(0 15px 12px rgba(0,0,0,0.3));
            transition: 0.4s ease;
        }

        /* --- REAL CHARGING ANIMATIONS --- */
        @keyframes scanline {
            0% { transform: translateY(100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }
        .charging-scan {
            position: absolute; width: 100%; height: 20px;
            background: linear-gradient(to top, transparent, var(--accent), transparent);
            display: none; z-index: 15;
        }
        .is-charging .charging-scan { display: block; animation: scanline 2s infinite linear; }

        @keyframes energy-pulse {
            0% { filter: drop-shadow(0 0 5px var(--accent)); }
            50% { filter: drop-shadow(0 0 25px var(--accent)); }
            100% { filter: drop-shadow(0 0 5px var(--accent)); }
        }
        .is-charging .pixar-3d-main { animation: energy-pulse 2s infinite ease-in-out; }

        /* Lock Screen */
        #usb-lock {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .lock-off { transform: translateY(-100%); pointer-events: none; }

        .bat-text { font-size: clamp(4rem, 15vw, 7.5rem); font-weight: 900; letter-spacing: -5px; line-height: 1; }
        
        #fluid-fill {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(0deg, var(--accent) 0%, transparent 100%);
            opacity: 0.2; transition: height 1.5s ease;
        }

        .theme-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: 0.3s; }
        .theme-dot:hover { transform: scale(1.2) rotate(15deg); }

        .sketch-font { font-family: 'Architects Daughter', cursive; }
        .calligraphy { font-family: 'Caveat', cursive; }
    </style>
</head>
<body onclick="initAudio()">

    <!-- USB HARDWARE LOCK -->
    <div id="usb-lock">
        <div class="pixar-3d w-32 h-32 mb-8">
            <svg viewBox="0 0 100 100">
                <rect x="30" y="30" width="40" height="45" rx="12" fill="var(--accent)" />
                <rect x="42" y="15" width="6" height="15" rx="2" fill="#fff" />
                <rect x="54" y="15" width="6" height="15" rx="2" fill="#fff" />
                <circle cx="50" cy="52" r="8" fill="rgba(255,255,255,0.4)" class="animate-ping" />
            </svg>
        </div>
        <h1 class="text-3xl font-black uppercase tracking-tighter" id="lock-title">Awaiting USB Power</h1>
        <p class="opacity-50 mt-2 font-bold calligraphy text-xl">System Build: 1.3.9-Stable</p>
        <button onclick="unlockManual()" class="mt-10 opacity-20 text-[10px] uppercase tracking-widest border border-white/20 px-6 py-2 rounded-full">Bypass Bridge</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <main class="max-w-5xl mx-auto p-4 md:p-10 space-y-6">
        
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="box-container flex flex-row items-center gap-4 w-full md:w-auto">
                <div>
                    <h1 class="text-2xl font-black">FiR<span style="color:var(--accent)">CHARGE</span></h1>
                    <p class="text-[10px] sketch-font tracking-widest uppercase text-blue-500 font-bold">WEB v1.3.9</p>
                </div>
                <div class="flex gap-2 border-l border-white/10 pl-4">
                    <div class="theme-dot" style="background:#00d2ff" onclick="setTheme('cyber')"></div>
                    <div class="theme-dot" style="background:#ff9d00" onclick="setTheme('solar')"></div>
                    <div class="theme-dot" style="background:#32ff7e" onclick="setTheme('bio')"></div>
                    <div class="theme-dot" style="background:#bd00ff" onclick="setTheme('royal')"></div>
                    <div class="theme-dot" style="background:#ffffff" onclick="setTheme('stealth')"></div>
                </div>
            </div>

            <div class="box-container flex flex-row justify-between items-center gap-8 w-full md:w-auto">
                <div class="text-right">
                    <div id="clock" class="text-3xl font-black tracking-tight" style="color:var(--accent)">00:00:00</div>
                    <div id="date" class="text-[10px] opacity-40 font-bold uppercase tracking-widest">---</div>
                </div>
                <button onclick="toggleMode()" class="p-3 bg-white/5 rounded-2xl text-2xl border border-white/10 shadow-lg" id="mode-btn">🌞</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <!-- Battery Centerpiece -->
            <div class="box-container md:col-span-5 flex flex-col items-center justify-center min-h-[440px] relative" id="main-battery-card">
                <div id="fluid-fill"></div>
                
                <div class="pixar-3d pixar-3d-main w-48 h-48 mb-4 z-10 relative overflow-hidden">
                    <div class="charging-scan"></div>
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <defs>
                            <linearGradient id="energyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:var(--accent)" />
                                <stop offset="100%" style="stop-color:transparent; stop-opacity:0" />
                            </linearGradient>
                        </defs>
                        <rect x="25" y="15" width="50" height="75" rx="15" fill="rgba(128,128,128,0.1)" stroke="var(--accent)" stroke-width="3"/>
                        <rect x="40" y="8" width="20" height="7" rx="3" fill="var(--accent)" />
                        <!-- Liquid Content -->
                        <rect id="svg-liquid" x="28" y="50" width="44" height="38" rx="10" fill="url(#energyGrad)" />
                        <path d="M30 22 Q 50 18 70 22" stroke="white" stroke-width="2" opacity="0.3" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>

                <div id="bat-level" class="bat-text z-10">0%</div>
                <div id="bat-status" class="z-10 font-black uppercase mt-4 tracking-widest text-sm" style="color:var(--accent)">Initializing...</div>
                <p id="rem-time" class="z-10 text-[10px] opacity-50 mt-1 uppercase font-bold tracking-widest">Est: --</p>
            </div>

            <!-- Side Intelligence -->
            <div class="md:col-span-7 grid grid-cols-1 gap-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="box-container flex items-center gap-4">
                        <div class="pixar-3d w-14 h-14">
                            <svg viewBox="0 0 100 100">
                                <circle cx="50" cy="75" r="18" fill="#ff4757" />
                                <rect x="42" y="15" width="16" height="50" rx="8" fill="#ff4757" />
                                <rect x="46" y="25" width="8" height="30" rx="4" fill="rgba(255,255,255,0.4)" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] opacity-40 font-bold uppercase" id="lbl-temp">Thermal</p>
                            <p class="text-2xl font-black">27.9°C</p>
                        </div>
                    </div>
                    <div class="box-container flex items-center gap-4">
                        <div class="pixar-3d w-14 h-14">
                            <svg viewBox="0 0 100 100">
                                <path d="M50 15 L85 45 L85 85 L15 85 L15 45 Z" fill="#2ecc71" />
                                <rect x="35" y="50" width="30" height="8" rx="2" fill="white" opacity="0.6" />
                                <rect x="46" y="38" width="8" height="32" rx="2" fill="white" opacity="0.6" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] opacity-40 font-bold uppercase" id="lbl-health">Health</p>
                            <p class="text-2xl font-black">Excellent</p>
                        </div>
                    </div>
                </div>

                <!-- Live Graph -->
                <div class="box-container h-60">
                    <div class="flex justify-between items-center mb-4">
                        <p class="sketch-font text-xs uppercase opacity-40 tracking-widest" id="lbl-curve">Power Graph</p>
                        <span class="text-[9px] font-bold px-2 py-1 rounded bg-blue-500/10" style="color:var(--accent)">1.3.9 STABLE</span>
                    </div>
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Language & Tip Footer -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="box-container border-l-8" style="border-left-color:var(--accent)">
                <p class="calligraphy text-2xl opacity-80" id="tip-text">Avoid 100% full cycles to double battery lifecycle.</p>
            </div>
            <div class="box-container flex items-center justify-between px-8">
                <button onclick="toggleLang()" class="font-black uppercase tracking-tighter text-sm">
                    Lang: <span id="lang-label" style="color:var(--accent)">EN</span>
                </button>
                <p class="text-[9px] opacity-30 font-bold uppercase">© 2025 FiRCHARGE • Studio Edition</p>
            </div>
        </div>

    </main>

    <script>
        let audioCtx, chart, battery;
        let lastLevel = 0;
        let currentLang = 'en';

        const translations = {
            en: {
                lockT: "Awaiting USB Power", 
                statusC: "Charging Active", statusD: "Power Disconnected",
                rem: "To 100%: ", full: "Battery Fully Charged",
                temp: "Thermal", health: "Health", curve: "Power Graph Blueprint",
                tip: "Keep between 20-80% for maximum longevity.",
                lang: "EN"
            },
            ms: {
                lockT: "Menunggu Kuasa USB",
                statusC: "Pengecasan Aktif", statusD: "Kuasa Terputus",
                rem: "Hingga 100%: ", full: "Bateri Cas Penuh",
                temp: "Suhu", health: "Kesihatan", curve: "Blueprint Graf Kuasa",
                tip: "Kekalkan antara 20-80% untuk jangka hayat maksimum.",
                lang: "BM"
            }
        };

        function unlockManual() { document.getElementById('usb-lock').classList.add('lock-off'); }

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function speak(text) {
            if(!window.speechSynthesis) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1; msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(chart) {
                chart.data.datasets[0].borderColor = accent;
                chart.data.datasets[0].backgroundColor = accent + '15';
                chart.update();
            }
        }

        function toggleMode() {
            const mode = document.documentElement.getAttribute('data-mode') === 'dark' ? 'white' : 'dark';
            document.documentElement.setAttribute('data-mode', mode);
            document.getElementById('mode-btn').innerText = mode === 'dark' ? '🌞' : '🌙';
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ms' : 'en';
            const t = translations[currentLang];
            document.getElementById('lock-title').innerText = t.lockT;
            document.getElementById('lbl-temp').innerText = t.temp;
            document.getElementById('lbl-health').innerText = t.health;
            document.getElementById('lbl-curve').innerText = t.curve;
            document.getElementById('tip-text').innerText = t.tip;
            document.getElementById('lang-label').innerText = t.lang;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toDateString();
        }

        async function initBattery() {
            try {
                battery = await navigator.getBattery();
                const update = () => {
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging;
                    const t = translations[currentLang];

                    // UI States
                    document.getElementById('usb-lock').classList.toggle('lock-off', charging);
                    document.getElementById('main-battery-card').classList.toggle('is-charging', charging);
                    
                    document.getElementById('bat-level').innerText = level + '%';
                    document.getElementById('fluid-fill').style.height = level + '%';
                    
                    const liquid = document.getElementById('svg-liquid');
                    liquid.setAttribute('height', (level * 0.7));
                    liquid.setAttribute('y', 90 - (level * 0.7));

                    document.getElementById('bat-status').innerText = charging ? t.statusC : t.statusD;

                    if(charging && battery.chargingTime !== Infinity) {
                        const mins = Math.floor(battery.chargingTime / 60);
                        document.getElementById('rem-time').innerText = t.rem + mins + "m";
                    } else {
                        document.getElementById('rem-time').innerText = level >= 100 ? t.full : "--";
                    }

                    if(level === 100 && lastLevel < 100) speak(t.full);
                    lastLevel = level;

                    if(chart) {
                        chart.data.datasets[0].data.push(level);
                        chart.data.datasets[0].data.shift();
                        chart.update();
                    }
                };
                battery.onchargingchange = update;
                battery.onlevelchange = update;
                update();
            } catch (e) { unlockManual(); }
        }

        window.onload = () => {
            setInterval(updateClock, 1000);
            initBattery();
            
            const ctx = document.getElementById('chart').getContext('2d');
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: Array(15).fill(0),
                        borderColor: accent,
                        borderWidth: 3,
                        tension: 0.4,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: accent + '15'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } },
                    plugins: { legend: { display: false } }
                }
            });
            setTheme('cyber');
            updateClock();
        };
    </script>
</body>
</html>
