<!DOCTYPE html>
<html lang="en" data-theme="cyber" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FiRCHARGE Pro | Pixar Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@700&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #05070a; --text: #ffffff; }

        [data-theme="cyber"] { --accent: #00d2ff; --glow: rgba(0, 210, 255, 0.5); }
        [data-theme="solar"] { --accent: #ff6a00; --glow: rgba(255, 106, 0, 0.5); }
        [data-theme="bio"] { --accent: #32ff7e; --glow: rgba(50, 255, 126, 0.5); }
        [data-theme="royal"] { --accent: #7d5fff; --glow: rgba(125, 95, 255, 0.5); }

        [data-mode="white"] { --bg: #f8fafc; --text: #0f172a; --card: rgba(255,255,255,0.8); }
        [data-mode="dark"] { --bg: #05070a; --text: #ffffff; --card: rgba(255,255,255,0.03); }

        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; min-height: 100vh; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .box-container {
            border: 1px solid rgba(128,128,128,0.1);
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        /* 3D Pixar Style Icon Base */
        .icon-3d-wrap {
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.2));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .icon-3d-wrap:hover { transform: translateY(-5px) scale(1.05); }

        .glass-highlight {
            fill: rgba(255, 255, 255, 0.3);
            filter: blur(2px);
        }

        /* Animations */
        #usb-lock {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: transform 0.7s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .lock-off { transform: translateY(-100%); pointer-events: none; }

        .bat-text { font-size: clamp(4rem, 15vw, 7rem); font-weight: 900; letter-spacing: -4px; line-height: 1; }
        
        #fluid-bg {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(0deg, var(--accent) 0%, transparent 100%);
            opacity: 0.15; transition: height 1.5s ease;
        }

        .theme-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body onclick="initAudio()">

    <!-- USB LOCK HUD -->
    <div id="usb-lock">
        <div class="icon-3d-wrap w-32 h-32 mb-6">
            <svg viewBox="0 0 100 100" class="w-full h-full">
                <defs>
                    <linearGradient id="plugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4facfe" />
                        <stop offset="100%" style="stop-color:#00f2fe" />
                    </linearGradient>
                </defs>
                <!-- 3D Body -->
                <rect x="30" y="30" width="40" height="45" rx="10" fill="url(#plugGrad)" />
                <rect x="35" y="35" width="30" height="35" rx="5" fill="rgba(255,255,255,0.1)" />
                <!-- 3D Pins -->
                <rect x="40" y="15" width="6" height="15" rx="2" fill="#fff" />
                <rect x="54" y="15" width="6" height="15" rx="2" fill="#fff" />
                <!-- Gloss -->
                <ellipse cx="45" cy="40" rx="10" ry="5" class="glass-highlight" />
            </svg>
        </div>
        <h1 class="text-3xl font-black uppercase tracking-tighter">Connect Power</h1>
        <p class="opacity-50 mt-2 font-bold">FiRCHARGE Pro Studio 1.3.7</p>
        <button onclick="unlockManual()" class="mt-10 opacity-20 text-[10px] uppercase tracking-widest border border-white/20 px-4 py-1 rounded-full">Bypass Interface</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <main class="max-w-4xl mx-auto p-4 md:p-10 space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="box-container flex flex-row items-center gap-4 w-full md:w-auto">
                <h1 class="text-2xl font-black">FiR<span style="color:var(--accent)">CHARGE</span></h1>
                <div class="flex gap-2 border-l border-white/10 pl-4">
                    <div class="theme-dot" style="background:#00d2ff" onclick="setTheme('cyber')"></div>
                    <div class="theme-dot" style="background:#ff6a00" onclick="setTheme('solar')"></div>
                    <div class="theme-dot" style="background:#32ff7e" onclick="setTheme('bio')"></div>
                    <div class="theme-dot" style="background:#7d5fff" onclick="setTheme('royal')"></div>
                </div>
            </div>

            <div class="box-container flex flex-row justify-between items-center gap-6 w-full md:w-auto">
                <div class="text-right">
                    <div id="clock" class="text-3xl font-black" style="color:var(--accent)">00:00:00</div>
                    <div id="date" class="text-[10px] opacity-40 font-bold uppercase tracking-widest">---</div>
                </div>
                <button onclick="toggleMode()" class="p-2 bg-white/5 rounded-2xl text-2xl border border-white/10">🌞</button>
            </div>
        </header>

        <!-- Main Battery Card -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <div class="box-container md:col-span-5 flex flex-col items-center justify-center min-h-[400px]">
                <div id="fluid-bg"></div>
                
                <div class="icon-3d-wrap w-40 h-40 mb-4 z-10">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <defs>
                            <linearGradient id="batGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:var(--accent)" />
                                <stop offset="100%" style="stop-color:var(--bg)" />
                            </linearGradient>
                        </defs>
                        <!-- 3D Battery Body -->
                        <rect x="25" y="15" width="50" height="75" rx="12" fill="rgba(128,128,128,0.1)" stroke="var(--accent)" stroke-width="2"/>
                        <rect x="40" y="8" width="20" height="7" rx="3" fill="var(--accent)" />
                        <!-- Liquid Content -->
                        <rect id="liquid-level" x="27" y="50" width="46" height="38" rx="10" fill="url(#batGrad)" />
                        <!-- Glossy Overlay -->
                        <path d="M30 20 Q 50 15 70 20" stroke="white" stroke-width="2" opacity="0.4" fill="none" stroke-linecap="round"/>
                        <rect x="30" y="25" width="10" height="50" rx="5" class="glass-highlight" />
                    </svg>
                </div>

                <div id="bat-level" class="bat-text z-10">0%</div>
                <div id="bat-status" class="z-10 font-black uppercase mt-4 tracking-widest text-sm" style="color:var(--accent)">Linking...</div>
            </div>

            <!-- Stats & Chart -->
            <div class="md:col-span-7 grid grid-cols-1 gap-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="box-container flex items-center gap-4">
                        <div class="icon-3d-wrap w-12 h-12">
                            <svg viewBox="0 0 100 100">
                                <rect x="40" y="10" width="20" height="70" rx="10" fill="#ff4757"/>
                                <circle cx="50" cy="80" r="15" fill="#ff4757"/>
                                <rect x="45" y="20" width="10" height="40" rx="5" fill="rgba(255,255,255,0.4)"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] opacity-40 font-bold uppercase">Thermal</p>
                            <p class="text-xl font-black">28.9°C</p>
                        </div>
                    </div>
                    <div class="box-container flex items-center gap-4">
                        <div class="icon-3d-wrap w-12 h-12">
                            <svg viewBox="0 0 100 100">
                                <path d="M50 15 L80 40 L80 85 L20 85 L20 40 Z" fill="#2ecc71" rx="10"/>
                                <rect x="35" y="45" width="30" height="10" rx="2" fill="white" opacity="0.5"/>
                                <rect x="45" y="35" width="10" height="30" rx="2" fill="white" opacity="0.5"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] opacity-40 font-bold uppercase">Health</p>
                            <p class="text-xl font-black">Excellent</p>
                        </div>
                    </div>
                </div>

                <div class="box-container h-52 flex items-center justify-center">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Footer Protocol -->
        <div class="box-container text-center border-l-8" style="border-left-color:var(--accent)">
            <p class="sketch-font text-xs uppercase opacity-40 mb-1">Charging Protocol</p>
            <p class="calligraphy text-2xl opacity-80" id="tip-text">Avoid 100% full cycles to double battery lifecycle.</p>
        </div>

    </main>

    <script>
        let audioCtx, chart, battery;
        let lastLevel = 0;
        let isCharging = false;

        function unlockManual() { document.getElementById('usb-lock').classList.add('lock-off'); }

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function speak(text) {
            if(!window.speechSynthesis) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1; msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(chart) {
                chart.data.datasets[0].borderColor = accent;
                chart.data.datasets[0].backgroundColor = accent + '10';
                chart.update();
            }
        }

        function toggleMode() {
            const mode = document.documentElement.getAttribute('data-mode') === 'dark' ? 'white' : 'dark';
            document.documentElement.setAttribute('data-mode', mode);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toDateString();
        }

        async function initBattery() {
            try {
                battery = await navigator.getBattery();
                const update = () => {
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging;

                    document.getElementById('usb-lock').classList.toggle('lock-off', charging);
                    document.getElementById('bat-level').innerText = level + '%';
                    document.getElementById('fluid-bg').style.height = level + '%';
                    
                    // Update 3D Icon Liquid
                    const liquid = document.getElementById('liquid-level');
                    liquid.setAttribute('height', (level * 0.75));
                    liquid.setAttribute('y', 90 - (level * 0.75));

                    document.getElementById('bat-status').innerText = charging ? "Flowing Energy" : "Power Disconnected";

                    if(level === 100 && lastLevel < 100) speak("Battery Full");
                    lastLevel = level;

                    if(chart) {
                        chart.data.datasets[0].data.push(level);
                        chart.data.datasets[0].data.shift();
                        chart.update();
                    }
                };
                battery.onchargingchange = update;
                battery.onlevelchange = update;
                update();
            } catch (e) {
                unlockManual();
            }
        }

        window.onload = () => {
            setInterval(updateClock, 1000);
            initBattery();
            
            const ctx = document.getElementById('chart').getContext('2d');
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: Array(15).fill(0),
                        borderColor: accent,
                        borderWidth: 3,
                        tension: 0.4,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: accent + '10'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } },
                    plugins: { legend: { display: false } }
                }
            });
            setTheme('cyber');
        };
    </script>
</body>
</html>
