<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FiRCHARGE Pro | Sonic 1.2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@700&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-dark: #02050a; --neon: #00d2ff; --energy: #39ff14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; min-height: 100vh; }

        .box-container {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 1.5rem; padding: 1rem; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center;
        }

        .bat-text { font-size: clamp(4rem, 15vw, 8rem); font-weight: 900; letter-spacing: -4px; line-height: 1; z-index: 10; }
        .clock-text { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 900; color: var(--neon); }

        .pixar-3d {
            width: clamp(50px, 12vw, 100px); height: auto;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: float 3s infinite ease-in-out; z-index: 10;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .energy-wave {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(0deg, rgba(0, 210, 255, 0.3) 0%, transparent 100%);
            transition: height 1.5s ease-in-out; z-index: 0;
        }

        #usb-lock {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #0a1122 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px; transition: opacity 0.5s;
        }
        .lock-off { opacity: 0; visibility: hidden; pointer-events: none; }

        .sketch-font { font-family: 'Architects Daughter', cursive; }
        .calligraphy { font-family: 'Caveat', cursive; }
    </style>
</head>
<body onclick="initAudio()">

    <!-- USB HARDWARE LOCK -->
    <div id="usb-lock">
        <img src="file:///android_res/drawable/icon_lock_3d.webp" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3106/3106842.png'" class="pixar-3d mb-4">
        <h1 class="text-2xl sketch-font text-white">Sila Sambung USB</h1>
        <p class="calligraphy text-blue-400 text-lg">FiRCHARGE Sonic v1.2.5</p>
    </div>

    <!-- MAIN DASHBOARD -->
    <main class="w-full max-w-4xl mx-auto p-4 md:p-8 space-y-4">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <header class="flex justify-between items-center box-container">
                <div>
                    <h1 class="text-xl font-black">FiR<span class="text-blue-500">CHARGE</span></h1>
                    <p class="text-[9px] sketch-font text-blue-400 tracking-widest uppercase">Sonic Engine 1.2.5</p>
                </div>
                <button onclick="toggleLang()" class="px-4 py-2 border border-white/10 rounded-xl text-xs font-bold bg-white/5 uppercase">BM/EN</button>
            </header>

            <div class="box-container flex-row items-center justify-between px-6">
                <div>
                    <div id="live-time" class="clock-text">00:00:00</div>
                    <div id="live-ampm" class="text-xs font-bold opacity-60">AM</div>
                </div>
                <div class="text-right">
                    <p id="live-day" class="sketch-font text-blue-400">Day</p>
                    <p id="live-date" class="text-[10px] opacity-40">00 Jan 2025</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <div class="box-container md:col-span-5 min-h-[320px] items-center">
                <div class="energy-wave" id="fluid"></div>
                <img src="file:///android_res/drawable/icon_battery_3d.webp" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3103/3103446.png'" class="pixar-3d mb-2">
                <div class="bat-text" id="bat-level">0%</div>
                <p id="bat-time" class="z-10 text-blue-300 font-bold mt-2 text-sm">Menghitung...</p>
            </div>

            <div class="md:col-span-7 grid grid-cols-2 gap-4">
                <div class="box-container flex-row items-center gap-3">
                    <img src="file:///android_res/drawable/icon_temp_3d.webp" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103611.png'" class="w-10 h-10">
                    <div><p class="text-[9px] opacity-50 uppercase">Temp</p><p class="text-lg font-black">30.2°C</p></div>
                </div>
                <div class="box-container flex-row items-center gap-3">
                    <img src="file:///android_res/drawable/icon_health_3d.webp" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4228/4228705.png'" class="w-10 h-10">
                    <div><p class="text-[9px] opacity-50 uppercase">Health</p><p class="text-lg font-black">Good</p></div>
                </div>
                <div class="box-container col-span-2 py-4 h-40">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="box-container border-l-4 border-blue-500">
                <h4 class="sketch-font text-blue-500 font-bold text-sm">Smart Protocol</h4>
                <p class="calligraphy text-lg opacity-70" id="tip1">Elakkan cas 100% setiap hari untuk jaga sel.</p>
            </div>
            <div class="box-container border-l-4 border-orange-500">
                <h4 class="sketch-font text-orange-500 font-bold text-sm">Thermal Guard</h4>
                <p class="calligraphy text-lg opacity-70" id="tip2">Suhu tinggi musuh utama jangka hayat bateri.</p>
            </div>
        </div>
    </main>

    <script>
        let currentLang = 'en';
        let chart;
        let audioCtx;
        let hasAnnouncedFull = false;
        let lastChargingStatus = false;

        const langData = {
            en: { days: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"], months: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"], wait: "Calculating...", full: "100% Charged", tip1: "Avoid 100% daily to prolong battery life.", tip2: "Heat is the #1 enemy of battery longevity." },
            ms: { days: ["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"], months: ["Jan","Feb","Mac","Apr","Mei","Jun","Jul","Ogos","Sep","Okt","Nov","Dis"], wait: "Menghitung...", full: "100% Penuh", tip1: "Elakkan cas 100% setiap hari untuk jaga sel.", tip2: "Suhu tinggi musuh utama jangka hayat bateri." }
        };

        function initAudio() { 
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSfx(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if(type === 'full') {
                // Futuristic Success Chime (Two notes: C5 to G5)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.3); // G5
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(); osc.stop(now + 0.6);
            } else if(type === 'connect') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            }
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('live-time').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            document.getElementById('live-ampm').innerText = ampm;
            const l = langData[currentLang];
            document.getElementById('live-day').innerText = l.days[now.getDay()];
            document.getElementById('live-date').innerText = `${now.getDate()} ${l.months[now.getMonth()]} ${now.getFullYear()}`;
        }

        async function monitor() {
            const battery = await navigator.getBattery();
            const updateUI = () => {
                const charging = battery.charging;
                const level = Math.round(battery.level * 100);

                // USB Connection Detection Logic
                document.getElementById('usb-lock').classList.toggle('lock-off', charging);
                
                // Play Connect Sound
                if(charging && !lastChargingStatus) playSfx('connect');
                lastChargingStatus = charging;

                // FULL CHARGE SOUND LOGIC
                if (level >= 100 && charging) {
                    if (!hasAnnouncedFull) {
                        playSfx('full');
                        hasAnnouncedFull = true;
                    }
                } else if (level < 100) {
                    hasAnnouncedFull = false; // Reset trigger if battery drops
                }

                document.getElementById('bat-level').innerText = level + '%';
                document.getElementById('fluid').style.height = level + '%';
                
                if (charging && battery.chargingTime !== Infinity) {
                    let mins = Math.floor(battery.chargingTime / 60);
                    document.getElementById('bat-time').innerText = mins + " mins to 100%";
                } else {
                    document.getElementById('bat-time').innerText = level >= 100 ? langData[currentLang].full : langData[currentLang].wait;
                }
            };
            battery.onchargingchange = updateUI;
            battery.onlevelchange = updateUI;
            updateUI();
        }

        function initChart() {
            const ctx = document.getElementById('chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(10).fill(''), datasets: [{ data: Array(10).fill(0), borderColor: '#00d2ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0,210,255,0.05)', pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } } }
            });
        }

        function toggleLang() { 
            currentLang = currentLang === 'en' ? 'ms' : 'en'; 
            updateClock(); 
            document.getElementById('tip1').innerText = langData[currentLang].tip1;
            document.getElementById('tip2').innerText = langData[currentLang].tip2;
        }

        window.onload = () => { updateClock(); setInterval(updateClock, 1000); monitor(); initChart(); };
    </script>
</body>
</html>
