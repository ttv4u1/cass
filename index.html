<!DOCTYPE html>
<html lang="en" data-theme="cyber" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 
        FiRCHARGE VERSION TRACKING 
        WEB: 1.4.1-Sonic-Stop
        ANDROID: 1.4.1-v37
    -->
    
    <title>FiRCHARGE Pro | Auto-Stop v1.4.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@700&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #030508; --text: #ffffff; }

        /* THEMES */
        [data-theme="cyber"] { --accent: #00d2ff; }
        [data-theme="solar"] { --accent: #ff9d00; }
        [data-theme="bio"] { --accent: #32ff7e; }
        [data-theme="royal"] { --accent: #bd00ff; }

        [data-mode="white"] { --bg: #f8fafc; --text: #0f172a; --card: rgba(255,255,255,0.9); --border: rgba(0,0,0,0.08); }
        [data-mode="dark"] { --bg: #030508; --text: #ffffff; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }

        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; min-height: 100vh; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        /* Handwriting Sketch Animation */
        @keyframes reveal-sketch { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }
        .animate-sketch { display: inline-block; animation: reveal-sketch 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        /* Boxes */
        .box-container {
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(25px);
            border-radius: 32px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        /* 3D Icons */
        .pixar-3d { filter: drop-shadow(0 15px 12px rgba(0,0,0,0.25)); transition: 0.4s ease; }
        .is-protected { filter: grayscale(1) brightness(0.8); }

        /* Charging Pulse */
        @keyframes pulse-energy { 0% { opacity: 0.2; } 50% { opacity: 0.5; } 100% { opacity: 0.2; } }
        .charging-pulse { animation: pulse-energy 2s infinite ease-in-out; }

        /* Lock Screen */
        #usb-lock {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .lock-off { transform: translateY(-100%); pointer-events: none; }

        /* Typography */
        .sketch-font { font-family: 'Architects Daughter', cursive; }
        .calligraphy { font-family: 'Caveat', cursive; }
        .bat-text { font-size: clamp(4rem, 12vw, 7rem); font-weight: 900; letter-spacing: -4px; line-height: 1; }

        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: 0.3s; }
    </style>
</head>
<body class="p-2 md:p-6" onclick="initAudio()">

    <!-- USB LOCK SCREEN -->
    <div id="usb-lock">
        <div class="pixar-3d w-28 h-28 mb-6">
            <svg viewBox="0 0 100 100">
                <rect x="30" y="30" width="40" height="45" rx="12" fill="var(--accent)" />
                <rect x="42" y="15" width="6" height="15" rx="2" fill="#fff" />
                <rect x="54" y="15" width="6" height="15" rx="2" fill="#fff" />
            </svg>
        </div>
        <h1 class="text-2xl font-black uppercase sketch-font animate-sketch" id="lock-title">Initialize Power Link</h1>
        <p class="calligraphy text-xl opacity-60 mt-2">Neural Protection Active</p>
        <button onclick="unlockManual()" class="mt-8 opacity-20 text-[10px] uppercase tracking-widest border border-white/20 px-4 py-1 rounded-full">Bypass Bridge</button>
    </div>

    <main class="max-w-5xl mx-auto space-y-5">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="box-container flex flex-row items-center gap-4 w-full md:w-auto">
                <div>
                    <h1 class="text-2xl font-black">FiR<span style="color:var(--accent)">CHARGE</span></h1>
                    <p class="text-[9px] sketch-font text-blue-500 font-bold uppercase tracking-widest">v1.4.1 Sonic-Stop</p>
                </div>
                <div class="flex gap-2 border-l border-white/10 pl-4">
                    <div class="theme-dot" style="background:#00d2ff" onclick="setTheme('cyber')"></div>
                    <div class="theme-dot" style="background:#ff9d00" onclick="setTheme('solar')"></div>
                    <div class="theme-dot" style="background:#32ff7e" onclick="setTheme('bio')"></div>
                </div>
            </div>

            <div class="box-container flex flex-row justify-between items-center gap-6 w-full md:w-auto">
                <div class="text-right">
                    <div id="clock" class="text-3xl font-black tracking-tighter" style="color:var(--accent)">00:00:00</div>
                    <div id="date" class="text-[10px] opacity-40 uppercase font-bold">---</div>
                </div>
                <button onclick="toggleMode()" class="p-3 bg-white/5 rounded-2xl text-2xl border border-white/10" id="mode-btn">🌞</button>
            </div>
        </header>

        <!-- Main Display -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-5">
            
            <!-- Battery Center -->
            <div class="box-container md:col-span-5 flex flex-col items-center justify-center min-h-[400px] relative">
                <div id="fluid-fill" class="absolute bottom-0 left-0 w-full opacity-20 transition-all duration-1000" style="background:var(--accent)"></div>
                
                <div class="pixar-3d w-40 h-40 mb-4 z-10" id="main-icon">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <rect x="25" y="15" width="50" height="75" rx="15" fill="rgba(128,128,128,0.05)" stroke="var(--accent)" stroke-width="3"/>
                        <rect x="40" y="8" width="20" height="7" rx="3" fill="var(--accent)" />
                        <rect id="svg-liquid" x="28" y="50" width="44" height="38" rx="10" fill="var(--accent)" />
                        <path id="charge-bolt" d="M50 35 L40 55 L50 55 L45 75 L60 50 L50 50 L55 35 Z" fill="#fff" class="charging-pulse"/>
                    </svg>
                </div>

                <div id="bat-level" class="bat-text z-10">0%</div>
                <div id="bat-status" class="z-10 sketch-font text-lg font-bold uppercase mt-2 animate-sketch" style="color:var(--accent)">Scanning...</div>
                <div id="stop-label" class="hidden z-10 bg-red-500 text-white text-[10px] font-black px-3 py-1 rounded-full mt-2 animate-pulse uppercase">Auto-Stop Active</div>
            </div>

            <!-- Stats -->
            <div class="md:col-span-7 grid grid-cols-1 gap-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="box-container flex items-center gap-3">
                        <div class="pixar-3d w-12 h-12">🌡️</div>
                        <div><p class="text-[10px] opacity-40 font-bold uppercase">Thermal</p><p class="text-xl font-black">27.5°C</p></div>
                    </div>
                    <div class="box-container flex items-center gap-3">
                        <div class="pixar-3d w-12 h-12">🛡️</div>
                        <div><p class="text-[10px] opacity-40 font-bold uppercase">Safety</p><p id="safety-status" class="text-xl font-black">Active</p></div>
                    </div>
                </div>

                <!-- Live Graph -->
                <div class="box-container h-52">
                    <p class="sketch-font text-xs uppercase opacity-40 mb-3 animate-sketch">Power Link Flow</p>
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="box-container border-l-8" style="border-left-color:var(--accent)">
                <p class="calligraphy text-2xl opacity-80" id="tip-text">Smart protection stops charging at 100% to save cell health.</p>
            </div>
            <div class="box-container flex items-center justify-between px-6">
                <button onclick="toggleLang()" class="sketch-font font-black uppercase text-xs">Lang: <span id="lang-label" style="color:var(--accent)">EN</span></button>
                <button onclick="testStop()" class="text-[9px] opacity-30 font-bold border border-white/20 px-2 py-1 rounded">SIMULATE 100%</button>
            </div>
        </div>

    </main>

    <script>
        let audioCtx, chart, battery;
        let lastLevel = 0;
        let currentLang = 'en';
        let isStopped = false;

        const translations = {
            en: {
                lock: "Initialize Power Link", statusC: "Flowing Energy", statusD: "Link Severed",
                statusS: "Charge Halted", full: "Battery Protected: 100%", tip: "Smart protection stops charging at 100% to save cell health.", lang: "EN"
            },
            ms: {
                lock: "Mulakan Sambungan", statusC: "Tenaga Mengalir", statusD: "Sambungan Putus",
                statusS: "Cas Dihentikan", full: "Bateri Dilindungi: 100%", tip: "Perlindungan pintar menghentikan cas pada 100% untuk jaga sel.", lang: "BM"
            }
        };

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSfx(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if(type === 'stop') {
                // Power Down Sound: High to Low
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                gain.gain.setValueAtTime(0.1, now);
                osc.start(); osc.stop(now + 0.5);
            } else if(type === 'connect') {
                // Power Up: Low to High
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                osc.start(); osc.stop(now + 0.2);
            }
        }

        function speak(text) {
            if(!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1; msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function triggerAutoStop() {
            if(isStopped) return;
            isStopped = true;
            playSfx('stop');
            speak(translations[currentLang].full);
            
            // UI Changes
            document.getElementById('bat-status').innerText = translations[currentLang].statusS;
            document.getElementById('bat-status').style.color = "#ef4444";
            document.getElementById('main-icon').classList.add('is-protected');
            document.getElementById('charge-bolt').classList.remove('charging-pulse');
            document.getElementById('charge-bolt').style.fill = "#ef4444";
            document.getElementById('stop-label').classList.remove('hidden');
            document.getElementById('safety-status').innerText = "PROTECTED";
            document.getElementById('safety-status').style.color = "#ef4444";
        }

        function testStop() { lastLevel = 99; triggerAutoStop(); document.getElementById('bat-level').innerText = "100%"; }

        async function initBattery() {
            try {
                battery = await navigator.getBattery();
                const update = () => {
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging;
                    const t = translations[currentLang];

                    document.getElementById('usb-lock').classList.toggle('lock-off', charging);
                    document.getElementById('bat-level').innerText = level + '%';
                    document.getElementById('fluid-fill').style.height = level + '%';
                    
                    const liquid = document.getElementById('svg-liquid');
                    liquid.setAttribute('height', (level * 0.7));
                    liquid.setAttribute('y', 90 - (level * 0.7));

                    if(level >= 100 && charging) {
                        triggerAutoStop();
                    } else if (!charging) {
                        isStopped = false;
                        document.getElementById('bat-status').innerText = t.statusD;
                        document.getElementById('stop-label').classList.add('hidden');
                        document.getElementById('main-icon').classList.remove('is-protected');
                        document.getElementById('bat-status').style.color = "var(--accent)";
                    } else {
                        isStopped = false;
                        document.getElementById('bat-status').innerText = t.statusC;
                        document.getElementById('stop-label').classList.add('hidden');
                        document.getElementById('charge-bolt').classList.add('charging-pulse');
                        document.getElementById('charge-bolt').style.fill = "#fff";
                    }

                    if(charging && lastLevel < level) playSfx('connect');
                    lastLevel = level;
                };
                battery.onchargingchange = update;
                battery.onlevelchange = update;
                update();
            } catch (e) { unlockManual(); }
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(chart) { chart.data.datasets[0].borderColor = accent; chart.update(); }
        }

        function toggleMode() {
            const mode = document.documentElement.getAttribute('data-mode') === 'dark' ? 'white' : 'dark';
            document.documentElement.setAttribute('data-mode', mode);
            document.getElementById('mode-btn').innerText = mode === 'dark' ? '🌞' : '🌙';
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ms' : 'en';
            const t = translations[currentLang];
            document.getElementById('lock-title').innerText = t.lock;
            document.getElementById('tip-text').innerText = t.tip;
            document.getElementById('lang-label').innerText = t.lang;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toDateString();
        }

        window.onload = () => {
            setInterval(updateClock, 1000);
            initBattery();
            const ctx = document.getElementById('chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(15).fill(''), datasets: [{ data: Array(15).fill(0), borderColor: '#00d2ff', tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
            });
            setTheme('cyber');
            updateClock();
        };
        
        function unlockManual() { document.getElementById('usb-lock').classList.add('lock-off'); }
    </script>
</body>
</html>
