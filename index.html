<!DOCTYPE html>
<html lang="en" data-theme="cyber" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 
        FiRCHARGE VERSION TRACKING 
        WEB: 1.4.0-Pro-Sketch
        ANDROID: 1.4.0-v36
    -->
    
    <title>FiRCHARGE Pro | Sketch v1.4.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@700&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #030508; --text: #ffffff; }

        /* THEME ENGINE */
        [data-theme="cyber"] { --accent: #00d2ff; }
        [data-theme="solar"] { --accent: #ff9d00; }
        [data-theme="bio"] { --accent: #32ff7e; }
        [data-theme="royal"] { --accent: #bd00ff; }

        [data-mode="white"] { --bg: #f8fafc; --text: #0f172a; --card: rgba(255,255,255,0.9); --border: rgba(0,0,0,0.08); }
        [data-mode="dark"] { --bg: #030508; --text: #ffffff; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }

        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; min-height: 100vh; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        /* --- REVEAL & HANDWRITING ANIMATIONS --- */
        @keyframes reveal-sketch {
            from { clip-path: inset(0 100% 0 0); }
            to { clip-path: inset(0 0 0 0); }
        }
        .animate-sketch {
            display: inline-block;
            animation: reveal-sketch 2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes entrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal-card { opacity: 0; animation: entrance 0.8s ease-out forwards; }

        /* Boxes */
        .box-container {
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Pixar 3D Icons */
        .pixar-3d {
            filter: drop-shadow(0 15px 12px rgba(0,0,0,0.25));
            transition: 0.4s ease;
        }

        /* Liquid Wave Animation */
        .energy-fill {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(0deg, var(--accent) 0%, transparent 100%);
            opacity: 0.2; transition: height 1.5s ease-in-out;
        }

        /* Lock Screen */
        #usb-lock {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .lock-off { transform: translateY(-100%); pointer-events: none; }

        /* Typography */
        .sketch-font { font-family: 'Architects Daughter', cursive; }
        .calligraphy { font-family: 'Caveat', cursive; }
        .bat-text { font-size: clamp(4rem, 12vw, 7rem); font-weight: 900; letter-spacing: -4px; line-height: 1; }

        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: 0.3s; }
        
        /* Grid Fix for small phones */
        @media (max-width: 400px) {
            .box-container { padding: 15px; border-radius: 20px; }
            .bat-text { font-size: 3.5rem; }
        }
    </style>
</head>
<body onclick="initAudio()">

    <!-- USB HARDWARE LOCK -->
    <div id="usb-lock">
        <div class="pixar-3d w-28 h-28 mb-6">
            <svg viewBox="0 0 100 100">
                <rect x="30" y="30" width="40" height="45" rx="12" fill="var(--accent)" />
                <rect x="42" y="15" width="6" height="15" rx="2" fill="#fff" />
                <rect x="54" y="15" width="6" height="15" rx="2" fill="#fff" />
                <circle cx="50" cy="52" r="6" fill="#fff" class="animate-ping" />
            </svg>
        </div>
        <h1 class="text-2xl font-black uppercase sketch-font animate-sketch" id="lock-title">Connect Power Signal</h1>
        <p class="calligraphy text-xl opacity-60 mt-2">FiRCHARGE Pro Studio 1.4.0</p>
        <button onclick="unlockManual()" class="mt-8 opacity-20 text-[10px] uppercase tracking-widest border border-white/20 px-4 py-1 rounded-full">Manual Bypass</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <main class="max-w-5xl mx-auto p-4 md:p-10 space-y-5">
        
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="box-container flex flex-row items-center gap-4 w-full md:w-auto reveal-card" style="animation-delay: 0.1s;">
                <div>
                    <h1 class="text-2xl font-black tracking-tight">FiR<span style="color:var(--accent)">CHARGE</span></h1>
                    <p class="text-[9px] sketch-font tracking-widest uppercase opacity-60 text-blue-500 font-bold">PRO SKETCH v1.4.0</p>
                </div>
                <div class="flex gap-2 border-l border-white/10 pl-4">
                    <div class="theme-dot" style="background:#00d2ff" onclick="setTheme('cyber')"></div>
                    <div class="theme-dot" style="background:#ff9d00" onclick="setTheme('solar')"></div>
                    <div class="theme-dot" style="background:#32ff7e" onclick="setTheme('bio')"></div>
                    <div class="theme-dot" style="background:#bd00ff" onclick="setTheme('royal')"></div>
                </div>
            </div>

            <div class="box-container flex flex-row justify-between items-center gap-6 w-full md:w-auto reveal-card" style="animation-delay: 0.2s;">
                <div class="text-right">
                    <div id="clock" class="text-3xl font-black tracking-tighter" style="color:var(--accent)">00:00:00</div>
                    <div id="date" class="text-[10px] opacity-40 font-bold uppercase tracking-widest">---</div>
                </div>
                <button onclick="toggleMode()" class="p-3 bg-white/5 rounded-2xl text-2xl border border-white/10" id="mode-btn">🌞</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-5">
            
            <!-- Battery Centerpiece -->
            <div class="box-container md:col-span-5 flex flex-col items-center justify-center min-h-[400px] relative reveal-card" style="animation-delay: 0.3s;">
                <div class="energy-fill" id="fluid-fill"></div>
                
                <div class="pixar-3d w-40 h-40 mb-4 z-10 relative">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <defs>
                            <linearGradient id="energyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:var(--accent)" />
                                <stop offset="100%" style="stop-color:transparent" />
                            </linearGradient>
                        </defs>
                        <rect x="25" y="15" width="50" height="75" rx="15" fill="rgba(128,128,128,0.05)" stroke="var(--accent)" stroke-width="3"/>
                        <rect x="40" y="8" width="20" height="7" rx="3" fill="var(--accent)" />
                        <!-- Liquid Content -->
                        <rect id="svg-liquid" x="28" y="50" width="44" height="38" rx="10" fill="url(#energyGrad)" />
                        <path d="M30 22 Q 50 18 70 22" stroke="white" stroke-width="2" opacity="0.3" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>

                <div id="bat-level" class="bat-text z-10">0%</div>
                <div id="bat-status" class="z-10 sketch-font text-lg font-bold uppercase mt-2 animate-sketch" style="color:var(--accent)">Scanning...</div>
                <p id="rem-time" class="z-10 calligraphy text-xl opacity-60">Est: --</p>
            </div>

            <!-- Side Stats -->
            <div class="md:col-span-7 grid grid-cols-1 gap-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="box-container flex items-center gap-3 reveal-card" style="animation-delay: 0.4s;">
                        <div class="pixar-3d w-12 h-12">
                            <svg viewBox="0 0 100 100">
                                <circle cx="50" cy="75" r="18" fill="#ff4757" />
                                <rect x="42" y="15" width="16" height="50" rx="8" fill="#ff4757" />
                                <rect x="46" y="25" width="8" height="30" rx="4" fill="rgba(255,255,255,0.4)" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] opacity-40 font-bold uppercase">Thermal</p>
                            <p class="text-xl font-black">27.5°C</p>
                        </div>
                    </div>
                    <div class="box-container flex items-center gap-3 reveal-card" style="animation-delay: 0.5s;">
                        <div class="pixar-3d w-12 h-12">
                            <svg viewBox="0 0 100 100">
                                <path d="M50 15 L85 45 L85 85 L15 85 L15 45 Z" fill="#2ecc71" />
                                <rect x="35" y="50" width="30" height="8" rx="2" fill="white" opacity="0.6" />
                                <rect x="46" y="38" width="8" height="32" rx="2" fill="white" opacity="0.6" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] opacity-40 font-bold uppercase">Health</p>
                            <p class="text-xl font-black">Stable</p>
                        </div>
                    </div>
                </div>

                <!-- Live Graph -->
                <div class="box-container h-52 reveal-card" style="animation-delay: 0.6s;">
                    <div class="flex justify-between items-center mb-3">
                        <p class="sketch-font text-xs uppercase opacity-40 tracking-widest animate-sketch">Power Link Visualization</p>
                        <span class="text-[9px] font-bold text-blue-500">LIVE SYNC</span>
                    </div>
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 reveal-card" style="animation-delay: 0.7s;">
            <div class="box-container border-l-8" style="border-left-color:var(--accent)">
                <p class="calligraphy text-2xl opacity-80" id="tip-text">Avoid 100% full cycles to preserve long-term health.</p>
            </div>
            <div class="box-container flex items-center justify-between px-6">
                <button onclick="toggleLang()" class="sketch-font font-black uppercase text-xs">
                    Language: <span id="lang-label" style="color:var(--accent)">ENGLISH</span>
                </button>
                <p class="text-[10px] opacity-30 font-bold uppercase">© 2025 FiRCHARGE</p>
            </div>
        </div>

    </main>

    <script>
        let audioCtx, chart, battery;
        let lastLevel = 0;
        let currentLang = 'en';

        const translations = {
            en: {
                lockT: "Connect Power Signal", statusC: "Energy Active", statusD: "Link Severed",
                rem: "To 100%: ", full: "Fully Charged", tip: "Avoid 100% full cycles to preserve long-term health.",
                lang: "ENGLISH", curve: "Power Link Visualization"
            },
            ms: {
                lockT: "Sambung Isyarat Kuasa", statusC: "Tenaga Aktif", statusD: "Sambungan Terputus",
                rem: "Hingga 100%: ", full: "Cas Penuh", tip: "Elakkan cas 100% setiap hari untuk memanjangkan hayat sel.",
                lang: "BAHASA MELAYU", curve: "Visualisasi Aliran Kuasa"
            }
        };

        function unlockManual() { document.getElementById('usb-lock').classList.add('lock-off'); }

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function speak(text) {
            if(!window.speechSynthesis) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1; msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(chart) {
                chart.data.datasets[0].borderColor = accent;
                chart.data.datasets[0].backgroundColor = accent + '15';
                chart.update();
            }
            reanimateSketch();
        }

        function toggleMode() {
            const mode = document.documentElement.getAttribute('data-mode') === 'dark' ? 'white' : 'dark';
            document.documentElement.setAttribute('data-mode', mode);
            document.getElementById('mode-btn').innerText = mode === 'dark' ? '🌞' : '🌙';
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ms' : 'en';
            const t = translations[currentLang];
            document.getElementById('lock-title').innerText = t.lockT;
            document.getElementById('tip-text').innerText = t.tip;
            document.getElementById('lang-label').innerText = t.lang;
            reanimateSketch();
        }

        function reanimateSketch() {
            document.querySelectorAll('.animate-sketch').forEach(el => {
                el.style.animation = 'none';
                el.offsetHeight; 
                el.style.animation = null;
            });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toDateString();
        }

        async function initBattery() {
            try {
                battery = await navigator.getBattery();
                const update = () => {
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging;
                    const t = translations[currentLang];

                    document.getElementById('usb-lock').classList.toggle('lock-off', charging);
                    document.getElementById('bat-level').innerText = level + '%';
                    document.getElementById('fluid-fill').style.height = level + '%';
                    
                    const liquid = document.getElementById('svg-liquid');
                    liquid.setAttribute('height', (level * 0.7));
                    liquid.setAttribute('y', 90 - (level * 0.7));

                    document.getElementById('bat-status').innerText = charging ? t.statusC : t.statusD;

                    if(charging && battery.chargingTime !== Infinity) {
                        const mins = Math.floor(battery.chargingTime / 60);
                        document.getElementById('rem-time').innerText = t.rem + mins + "m";
                    } else {
                        document.getElementById('rem-time').innerText = level >= 100 ? t.full : "--";
                    }

                    if(level === 100 && lastLevel < 100) speak(t.full);
                    lastLevel = level;

                    if(chart) {
                        chart.data.datasets[0].data.push(level);
                        chart.data.datasets[0].data.shift();
                        chart.update();
                    }
                };
                battery.onchargingchange = update;
                battery.onlevelchange = update;
                update();
            } catch (e) { unlockManual(); }
        }

        window.onload = () => {
            setInterval(updateClock, 1000);
            initBattery();
            
            const ctx = document.getElementById('chart').getContext('2d');
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: Array(15).fill(0),
                        borderColor: accent,
                        borderWidth: 3,
                        tension: 0.4,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: accent + '15'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } },
                    plugins: { legend: { display: false } }
                }
            });
            setTheme('cyber');
            updateClock();
        };
    </script>
</body>
</html>
