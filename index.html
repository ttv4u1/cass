<!DOCTYPE html>
<html lang="en" data-theme="cyber" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 
        FiRCHARGE VERSION TRACKING 
        WEB: 1.4.4-Precision
        ANDROID: 1.4.4-v40
    -->
    
    <title>FiRCHARGE Pro | Precision v1.4.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@700&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #030508; --text: #ffffff; }

        [data-theme="cyber"] { --accent: #00d2ff; }
        [data-theme="solar"] { --accent: #ff9d00; }
        [data-theme="bio"] { --accent: #32ff7e; }
        [data-theme="royal"] { --accent: #bd00ff; }

        [data-mode="white"] { --bg: #f8fafc; --text: #0f172a; --card: rgba(255,255,255,0.95); --border: rgba(0,0,0,0.1); }
        [data-mode="dark"] { --bg: #030508; --text: #ffffff; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }

        body { 
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; min-height: 100vh; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        /* Handwriting Reveal Animation */
        @keyframes reveal-sketch { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }
        .animate-sketch { display: inline-block; animation: reveal-sketch 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        /* Modal Reveal */
        @keyframes modal-reveal {
            from { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        .modal-active { display: flex !important; animation: modal-reveal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .box-container {
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(25px);
            border-radius: 32px; padding: 20px;
            cursor: pointer; transition: all 0.3s ease;
            position: relative;
        }
        .box-container:hover { transform: translateY(-5px); border-color: var(--accent); }

        .pixar-3d { filter: drop-shadow(0 15px 12px rgba(0,0,0,0.25)); transition: 0.4s ease; }
        .is-protected { filter: grayscale(1) brightness(0.6) !important; }

        /* Energy Fill */
        .energy-fill {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(0deg, var(--accent) 0%, transparent 100%);
            opacity: 0.2; transition: height 1.5s ease-in-out;
            z-index: 0;
        }

        /* Charging Pulse */
        @keyframes bolt-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.1); } }
        .charging-active { animation: bolt-pulse 2s infinite ease-in-out; }

        /* Lock Screen */
        #usb-lock {
            position: fixed; inset: 0; z-index: 9990;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .lock-off { transform: translateY(-100%); pointer-events: none; }

        /* Detail Overlay */
        #detail-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); padding: 20px;
        }

        .bat-text { font-size: clamp(4rem, 12vw, 7rem); font-weight: 900; letter-spacing: -4px; line-height: 1; }
        .sketch-font { font-family: 'Architects Daughter', cursive; }
        .calligraphy { font-family: 'Caveat', cursive; }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
    </style>
</head>
<body class="p-2 md:p-6" onclick="initAudio()">

    <!-- USB LOCK HUD -->
    <div id="usb-lock">
        <div class="pixar-3d w-28 h-28 mb-6">
            <svg viewBox="0 0 100 100">
                <rect x="30" y="30" width="40" height="45" rx="12" fill="var(--accent)" />
                <rect x="42" y="15" width="6" height="15" rx="2" fill="#fff" />
                <rect x="54" y="15" width="6" height="15" rx="2" fill="#fff" />
            </svg>
        </div>
        <h1 class="text-2xl font-black uppercase sketch-font animate-sketch" id="lock-title">Initialize Power Link</h1>
        <p class="calligraphy text-xl opacity-60 mt-2">v1.4.4 Precision Engine</p>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detail-overlay" onclick="closeDetail()">
        <div class="box-container max-w-lg w-full bg-black/90 border-accent p-10 text-center" onclick="event.stopPropagation()">
            <div id="modal-icon" class="text-6xl mb-6">🔍</div>
            <h2 id="modal-title" class="sketch-font text-3xl text-blue-400 mb-4">Precision Intel</h2>
            <p id="modal-desc" class="calligraphy text-2xl opacity-90 leading-relaxed"></p>
            <button onclick="closeDetail()" class="mt-8 px-10 py-3 bg-blue-600 rounded-full font-black text-xs uppercase tracking-widest shadow-lg">Close Interface</button>
        </div>
    </div>

    <main class="max-w-5xl mx-auto space-y-5">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="box-container flex flex-row items-center gap-4 w-full md:w-auto">
                <div>
                    <h1 class="text-2xl font-black">FiR<span style="color:var(--accent)">CHARGE</span></h1>
                    <p class="text-[9px] sketch-font text-blue-500 font-bold uppercase tracking-widest">Precision v1.4.4</p>
                </div>
                <div class="flex gap-2 border-l border-white/10 pl-4">
                    <div class="theme-dot" style="background:#00d2ff" onclick="setTheme('cyber')"></div>
                    <div class="theme-dot" style="background:#ff9d00" onclick="setTheme('solar')"></div>
                    <div class="theme-dot" style="background:#32ff7e" onclick="setTheme('bio')"></div>
                </div>
            </div>

            <div class="box-container flex flex-row justify-between items-center gap-6 w-full md:w-auto">
                <div class="text-right">
                    <div id="clock" class="text-3xl font-black tracking-tighter" style="color:var(--accent)">00:00:00</div>
                    <div id="date" class="text-[10px] opacity-40 uppercase font-bold">---</div>
                </div>
                <button onclick="toggleMode()" class="p-3 bg-white/5 rounded-2xl text-2xl shadow-inner" id="mode-btn">🌞</button>
            </div>
        </header>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-5">
            
            <!-- Battery Core -->
            <div class="box-container md:col-span-5 min-h-[420px] flex flex-col items-center justify-center" id="main-card" onclick="openDetail('battery')">
                <div id="fluid-fill" class="energy-fill"></div>
                
                <div class="pixar-3d w-44 h-44 mb-4 z-10" id="main-icon">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <rect x="25" y="15" width="50" height="75" rx="15" fill="rgba(128,128,128,0.05)" stroke="var(--accent)" stroke-width="3"/>
                        <rect x="40" y="8" width="20" height="7" rx="3" fill="var(--accent)" />
                        <rect id="svg-liquid" x="28" y="50" width="44" height="38" rx="10" fill="var(--accent)" />
                        <path id="charge-bolt" d="M50 35 L40 55 L50 55 L45 75 L60 50 L50 50 L55 35 Z" fill="#fff" />
                    </svg>
                </div>
                <div id="bat-level" class="bat-text z-10">0%</div>
                <div id="status-tag" class="z-10 bg-blue-500/20 px-4 py-1 rounded-full text-[10px] font-black uppercase mt-4 animate-pulse tracking-widest">Scanning...</div>
            </div>

            <!-- Stats -->
            <div class="md:col-span-7 grid grid-cols-1 gap-5">
                <div class="grid grid-cols-2 gap-4">
                    <!-- REALTIME REMAINING TIME -->
                    <div class="box-container flex items-center gap-3" onclick="openDetail('time')">
                        <div class="text-4xl">⌛</div>
                        <div>
                            <p class="text-[10px] opacity-40 font-bold uppercase" id="lbl-rem-title">Remaining</p>
                            <p id="bat-time" class="text-xl font-black" style="color:var(--accent)">00m 00s</p>
                        </div>
                    </div>
                    <div class="box-container flex items-center gap-3" onclick="openDetail('thermal')">
                        <div class="text-4xl">🌡️</div>
                        <div><p class="text-[10px] opacity-40 font-bold uppercase">Thermal</p><p class="text-xl font-black">27.5°C</p></div>
                    </div>
                </div>

                <!-- Live Graph -->
                <div class="box-container h-56" onclick="openDetail('graph')">
                    <p class="sketch-font text-xs uppercase opacity-40 mb-3 animate-sketch">Power Pulse Diagnostic</p>
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="box-container border-l-8" style="border-left-color:var(--accent)" onclick="openDetail('tip')">
                <p class="calligraphy text-2xl opacity-80" id="tip-text">Precise time-to-full calculation active. Monitoring current wattage.</p>
            </div>
            <div class="box-container flex items-center justify-between px-6">
                <button onclick="toggleLang()" class="sketch-font font-black uppercase text-xs">Lang: <span id="lang-label" style="color:var(--accent)">EN</span></button>
                <div class="text-[9px] opacity-30 font-bold uppercase">FiRCHARGE Precision © 2025</div>
            </div>
        </div>

    </main>

    <script>
        let audioCtx, chart, battery;
        let lastLevel = 0;
        let currentLang = 'en';
        let isAutoStopped = false;
        let lastChargingState = false;

        const translations = {
            en: {
                lock: "Initialize Power Link",
                battery_title: "Core Intel",
                battery_desc: "The lithium core is absorbing current. Energy density is being monitored for stability.",
                time_title: "Precision Timer",
                time_desc: "Calculated based on real-time mA intake. Accuracy improves as charging stabilizes.",
                thermal_title: "Thermal Mapping",
                thermal_desc: "Sensors indicate optimal heat dissipation. No risk to cell longevity.",
                graph_title: "Power Pulse",
                graph_desc: "Real-time stability of current. Peaks represent fast-charge bursts.",
                tip_title: "Expert Tip",
                tip_desc: "For the longest lifespan, unplug your device once it reaches 100%. Neural protection is active.",
                voice_full: "Battery 100% full. Neural protection activated. Charging halted.",
                voice_stop: "Charging stopped. System secured.",
                voice_start: "Power linked. Energy flow initiated.",
                full_tag: "Protected", charging_tag: "Flowing", disc_tag: "Disconnected",
                rem_title: "Remaining", wait: "Calculating...", full: "100% Ready",
                lang: "EN"
            },
            ms: {
                lock: "Mulakan Isyarat Kuasa",
                battery_title: "Intel Teras",
                battery_desc: "Teras lithium sedang menyerap arus. Ketumpatan tenaga dipantau untuk kestabilan.",
                time_title: "Pemasa Tepat",
                time_desc: "Dikira berdasarkan pengambilan mA masa nyata. Ketepatan meningkat apabila pengecasan stabil.",
                thermal_title: "Pemetaan Terma",
                thermal_desc: "Sensor menunjukkan pelesapan haba optimum. Tiada risiko kepada jangka hayat sel.",
                graph_title: "Nadi Kuasa",
                graph_desc: "Kestabilan tenaga masa nyata. Puncak menunjukkan letusan cas pantas.",
                tip_title: "Tips Pakar",
                tip_desc: "Untuk jangka hayat terlama, cabut peranti anda setelah mencapai 100%. Perlindungan neural aktif.",
                voice_full: "Bateri seratus peratus penuh. Perlindungan neural diaktifkan. Pengecasan dihentikan.",
                voice_stop: "Pengecasan dihentikan. Sistem selamat.",
                voice_start: "Kuasa disambung. Aliran tenaga bermula.",
                full_tag: "Dilindungi", charging_tag: "Mengalir", disc_tag: "Terputus",
                rem_title: "Baki Masa", wait: "Menghitung...", full: "100% Sedia",
                lang: "BM"
            }
        };

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function speak(text) {
            if(!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = currentLang === 'en' ? 'en-US' : 'ms-MY';
            msg.rate = 1; msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        function openDetail(key) {
            const overlay = document.getElementById('detail-overlay');
            const t = translations[currentLang];
            const icons = { battery: '🔋', time: '⌛', thermal: '🌡️', graph: '📊', tip: '💡' };
            document.getElementById('modal-icon').innerText = icons[key] || '🔍';
            document.getElementById('modal-title').innerText = t[key + '_title'];
            document.getElementById('modal-desc').innerText = t[key + '_desc'];
            overlay.classList.add('modal-active');
        }

        function closeDetail() { document.getElementById('detail-overlay').classList.remove('modal-active'); }

        async function initBattery() {
            try {
                battery = await navigator.getBattery();
                const update = () => {
                    const level = Math.round(battery.level * 100);
                    const charging = battery.charging;
                    const t = translations[currentLang];

                    document.getElementById('usb-lock').classList.toggle('lock-off', charging);
                    document.getElementById('bat-level').innerText = level + '%';
                    document.getElementById('fluid-fill').style.height = level + '%';
                    
                    const liquid = document.getElementById('svg-liquid');
                    liquid.setAttribute('height', (level * 0.7));
                    liquid.setAttribute('y', 90 - (level * 0.7));

                    // --- REALTIME TIME TO FULL CALCULATION ---
                    if (charging && battery.chargingTime !== Infinity) {
                        const totalSeconds = battery.chargingTime;
                        const mins = Math.floor(totalSeconds / 60);
                        const secs = Math.floor(totalSeconds % 60);
                        document.getElementById('bat-time').innerText = `${mins}m ${secs}s`;
                    } else if (level >= 100) {
                        document.getElementById('bat-time').innerText = t.full;
                    } else {
                        document.getElementById('bat-time').innerText = t.wait;
                    }

                    // Voice Notification
                    if(charging && !lastChargingState) speak(t.voice_start);
                    else if(!charging && lastChargingState) speak(t.voice_stop);
                    lastChargingState = charging;

                    // Status UI
                    if(level >= 100 && charging) {
                        if(!isAutoStopped) {
                            isAutoStopped = true;
                            speak(t.voice_full);
                        }
                        document.getElementById('status-tag').innerText = t.full_tag;
                        document.getElementById('status-tag').style.background = "#ef4444";
                        document.getElementById('main-card').classList.add('is-protected');
                    } else if (!charging) {
                        isAutoStopped = false;
                        document.getElementById('status-tag').innerText = t.disc_tag;
                        document.getElementById('status-tag').style.background = "rgba(128,128,128,0.2)";
                        document.getElementById('main-card').classList.remove('is-protected');
                    } else {
                        isAutoStopped = false;
                        document.getElementById('status-tag').innerText = t.charging_tag;
                        document.getElementById('status-tag').style.background = "rgba(59,130,246,0.2)";
                        document.getElementById('main-card').classList.remove('is-protected');
                        document.getElementById('charge-bolt').classList.add('charging-active');
                    }

                    if(chart) { chart.data.datasets[0].data.push(level); chart.data.datasets[0].data.shift(); chart.update(); }
                };
                
                battery.onchargingchange = update;
                battery.onlevelchange = update;
                battery.onchargingtimechange = update;
                update();
            } catch (e) { document.getElementById('usb-lock').classList.add('lock-off'); }
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            if(chart) { chart.data.datasets[0].borderColor = accent; chart.update(); }
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ms' : 'en';
            const t = translations[currentLang];
            document.getElementById('lang-label').innerText = t.lang;
            document.getElementById('lock-title').innerText = t.lock;
            document.getElementById('lbl-rem-title').innerText = t.rem_title;
            document.getElementById('tip-text').innerText = t.tip_desc;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toDateString();
        }

        window.onload = () => {
            setInterval(updateClock, 1000);
            initBattery();
            const ctx = document.getElementById('chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(15).fill(''), datasets: [{ data: Array(15).fill(0), borderColor: '#00d2ff', tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
            });
            setTheme('cyber');
        };
    </script>
</body>
</html>
